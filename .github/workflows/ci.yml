name: release-gate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  villani-code:
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: components/villani-code/pyproject.toml
      - run: python -m pip install -e "components/villani-code[dev]"
      - run: python -m pytest -q
        working-directory: components/villani-code
      - run: ruff check --select E9,F villani_code/cli.py villani_code/execution.py villani_code/command_environment.py
        working-directory: components/villani-code
      - run: mypy villani_code/cli.py villani_code/execution.py villani_code/command_environment.py
        working-directory: components/villani-code

  villani-ops:
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: components/villani-ops/pyproject.toml
      - run: python -m pip install -e "components/villani-ops[test]"
      - run: python -m pytest -q
        working-directory: components/villani-ops
      - run: ruff check villani_ops tests
        working-directory: components/villani-ops
      - run: mypy --follow-imports=skip --ignore-missing-imports villani_ops/closed_loop villani_ops/cli/unified.py villani_ops/providers.py
        working-directory: components/villani-ops

  villani-ops-process-tree:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: components/villani-ops/pyproject.toml
      - run: python -m pip install -e "components/villani-ops[test]"
      - name: Repeat the deterministic process-tree timeout proof 20 times
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          for run in $(seq 1 20); do
            echo "process-tree proof $run/20"
            python -m pytest villani_ops/tests/test_villani_code_runner.py::test_villani_code_runner_timeout_kills_child_process_group -q
          done
        working-directory: components/villani-ops
      - name: Repeat the deterministic process-tree timeout proof 20 times
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          1..20 | ForEach-Object {
            Write-Host "process-tree proof $_/20"
            python -m pytest villani_ops/tests/test_villani_code_runner.py::test_villani_code_runner_timeout_kills_child_process_group -q
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
        working-directory: components/villani-ops

  villani-agentd:
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: |
            components/villani-ops/pyproject.toml
            components/villani-agentd/pyproject.toml
      - run: python -m pip install -e "components/villani-ops" -e "components/villani-agentd[test]"
      - run: python -m pytest -q
        working-directory: components/villani-agentd
      - run: ruff check villani_agentd tests
        working-directory: components/villani-agentd
      - run: mypy --follow-imports=skip --ignore-missing-imports villani_agentd
        working-directory: components/villani-agentd

  villani-control-plane:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: villani
          POSTGRES_PASSWORD: villani
          POSTGRES_DB: villani_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U villani -d villani_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      VILLANI_TEST_POSTGRES_URL: postgresql+psycopg://villani:villani@127.0.0.1:5432/villani_test
      VILLANI_CONTROL_PLANE_DATABASE_URL: postgresql+psycopg://villani:villani@127.0.0.1:5432/villani_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            components/villani-ops/pyproject.toml
            components/villani-control-plane/pyproject.toml
      - run: python -m pip install -e "components/villani-ops" -e "components/villani-control-plane[test]"
      - run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - run: alembic upgrade head
        working-directory: components/villani-control-plane
      - name: Record PostgreSQL 16 and Alembic head
        env:
          PGPASSWORD: villani
        run: |
          set -euo pipefail
          psql --host 127.0.0.1 --username villani --dbname villani_test --tuples-only --no-align --command "SHOW server_version" | tee "$RUNNER_TEMP/postgres-version.log"
          alembic current | tee "$RUNNER_TEMP/alembic-current.log"
        working-directory: components/villani-control-plane
      - run: alembic upgrade head --sql > "$RUNNER_TEMP/control-plane-migrations.sql"
        working-directory: components/villani-control-plane
      - run: python -m pytest tests/unit -q
        working-directory: components/villani-control-plane
      - run: python -m pytest -q --run-load-smoke --junitxml="$RUNNER_TEMP/control-plane-postgres.xml"
        working-directory: components/villani-control-plane
      - run: python scripts/assert-no-pytest-skips.py "$RUNNER_TEMP/control-plane-postgres.xml"
      - name: Back up and restore the migrated PostgreSQL database
        run: |
          set -euo pipefail
          python scripts/postgres-backup-restore-smoke.py 2>&1 | tee "$RUNNER_TEMP/postgres-backup-restore.log"
      - run: ruff check villani_control_plane tests
        working-directory: components/villani-control-plane
      - run: mypy --follow-imports=skip --ignore-missing-imports villani_control_plane
        working-directory: components/villani-control-plane
      - name: Preserve PostgreSQL service logs
        if: always()
        continue-on-error: true
        run: docker logs "${{ job.services.postgres.id }}" > "$RUNNER_TEMP/postgres-service.log" 2>&1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: control-plane-postgres-evidence
          path: |
            ${{ runner.temp }}/control-plane-postgres.xml
            ${{ runner.temp }}/control-plane-migrations.sql
            ${{ runner.temp }}/postgres-version.log
            ${{ runner.temp }}/alembic-current.log
            ${{ runner.temp }}/postgres-backup-restore.log
            ${{ runner.temp }}/postgres-service.log
          retention-days: 90

  node-engine-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python scripts/check-node-engine-contract.py

  clean-install:
    needs: node-engine-contract
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.13"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            components/villani-web/package-lock.json
            components/villani-flight-recorder/package-lock.json
      - name: Install from an untouched new environment
        run: python scripts/install-local.py --venv "$RUNNER_TEMP/villani-clean"
      - run: '"$RUNNER_TEMP/villani-clean/bin/python" -m pip check'
      - name: Validate every public entry point and import
        run: |
          set -euo pipefail
          for command in villani villani-code villani-agentd vfr; do
            "$RUNNER_TEMP/villani-clean/bin/$command" --help
          done
          "$RUNNER_TEMP/villani-clean/bin/python" -c "import villani_distribution, villani_ops, villani_code, villani_agentd"

  flight-recorder:
    needs: node-engine-contract
    env:
      VFR_CONCURRENCY_DIAGNOSTICS_DIR: ${{ runner.temp }}/flight-recorder-diagnostics
    strategy:
      fail-fast: false
      matrix:
        include:
          - node: 20.x
            label: node-20
          - node: lts/*
            label: current-lts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: components/villani-flight-recorder/package-lock.json
      - name: Record Flight Recorder runtime identity
        run: |
          mkdir -p "$VFR_CONCURRENCY_DIAGNOSTICS_DIR"
          node --version > "$VFR_CONCURRENCY_DIAGNOSTICS_DIR/node-version.txt"
          npm --version > "$VFR_CONCURRENCY_DIAGNOSTICS_DIR/npm-version.txt"
      - name: Verify standalone clean-checkout precondition
        run: |
          test ! -d components/villani-run-model/node_modules
          test ! -d components/villani-web/node_modules
          test ! -d components/villani-flight-recorder/node_modules
      - run: npm ci
        working-directory: components/villani-flight-recorder
      - run: npm audit --omit=dev
        working-directory: components/villani-flight-recorder
      - name: Run the complete suite three consecutive times
        run: |
          mkdir -p "$RUNNER_TEMP/flight-recorder-diagnostics"
          for run in 1 2 3; do
            echo "Flight Recorder full-suite run $run/3"
            set +e
            npm test 2>&1 | tee "$RUNNER_TEMP/flight-recorder-diagnostics/full-suite-$run.log"
            status=${PIPESTATUS[0]}
            set -e
            test "$status" -eq 0
          done
        working-directory: components/villani-flight-recorder
      - name: Run bounded in-process and fresh-process concurrency stress
        run: |
          set -euo pipefail
          npm run test:concurrency-stress 2>&1 | tee "$RUNNER_TEMP/flight-recorder-diagnostics/concurrency-stress.log"
        working-directory: components/villani-flight-recorder
      - run: npm run typecheck
        working-directory: components/villani-flight-recorder
      - run: npm run build
        working-directory: components/villani-flight-recorder
      - run: npm run format:check
        working-directory: components/villani-flight-recorder
      - run: npm pack --dry-run
        working-directory: components/villani-flight-recorder
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flight-recorder-diagnostics-${{ matrix.label }}
          path: ${{ runner.temp }}/flight-recorder-diagnostics/
          if-no-files-found: error
          retention-days: 90

  villani-ui:
    needs: node-engine-contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: components/villani-ui/package-lock.json
      - run: npm ci
        working-directory: components/villani-ui
      - run: npm test
        working-directory: components/villani-ui
      - run: npm run build
        working-directory: components/villani-ui
      - run: npm pack --dry-run
        working-directory: components/villani-ui

  villani-run-model:
    needs: node-engine-contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: components/villani-run-model/package-lock.json
      - run: npm ci
        working-directory: components/villani-run-model
      - run: npm audit --omit=dev
        working-directory: components/villani-run-model
      - run: npm test
        working-directory: components/villani-run-model
      - run: npm run typecheck
        working-directory: components/villani-run-model
      - run: npm run build
        working-directory: components/villani-run-model
      - name: Verify committed run-model distribution is current
        run: git diff --exit-code -- components/villani-run-model/dist

  villani-web:
    needs: node-engine-contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: components/villani-web/package-lock.json
      - name: Verify standalone clean-checkout precondition
        run: |
          test ! -d components/villani-run-model/node_modules
          test ! -d components/villani-flight-recorder/node_modules
          test ! -d components/villani-web/node_modules
      - run: npm ci
        working-directory: components/villani-web
      - run: npx playwright install --with-deps chromium
        working-directory: components/villani-web
      - run: npm audit --omit=dev
        working-directory: components/villani-web
      - run: npm test
        working-directory: components/villani-web
      - run: npm run typecheck
        working-directory: components/villani-web
      - run: npm run build
        working-directory: components/villani-web
      - run: python scripts/sync-console-assets.py --check
      - run: npm run format:check
        working-directory: components/villani-web
      - run: npm run e2e
        working-directory: components/villani-web
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: villani-web-playwright-failure
          path: |
            components/villani-web/playwright-report/
            components/villani-web/test-results/
          if-no-files-found: ignore

  cross-component:
    needs: node-engine-contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            components/villani-code/pyproject.toml
            components/villani-ops/pyproject.toml
            components/villani-agentd/pyproject.toml
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: components/villani-flight-recorder/package-lock.json
      - run: python -m pip install -e "components/villani-code[dev]" -e "components/villani-ops[test]" -e "components/villani-agentd[test]" -e "components/villani-control-plane[test]"
      - run: npm ci
        working-directory: components/villani-flight-recorder
      - run: npm run build
        working-directory: components/villani-flight-recorder
      - run: python -m pytest components/villani-ops/villani_ops/tests/closed_loop tests/closed_loop -q
      - run: python scripts/check-secrets.py integration/fixtures

  package-smoke:
    needs: node-engine-contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: python -m pip install build pytest
      - run: npm ci
        working-directory: components/villani-web
      - run: npm run build
        working-directory: components/villani-web
      - run: python scripts/sync-console-assets.py --check
      - run: python -m build --wheel --outdir "$RUNNER_TEMP/villani-wheels" components/villani-code
      - run: python -m build --wheel --outdir "$RUNNER_TEMP/villani-wheels" components/villani-ops
      - run: python -m build --wheel --outdir "$RUNNER_TEMP/villani-wheels" components/villani-agentd
      - run: python -m venv "$RUNNER_TEMP/villani-smoke"
      - run: '"$RUNNER_TEMP/villani-smoke/bin/python" -m pip install pytest'
      - run: '"$RUNNER_TEMP/villani-smoke/bin/python" -m pip install "$RUNNER_TEMP/villani-wheels"/*.whl'
      - run: '"$RUNNER_TEMP/villani-smoke/bin/villani" --help'
      - run: '"$RUNNER_TEMP/villani-smoke/bin/villani-code" --help'
      - run: '"$RUNNER_TEMP/villani-smoke/bin/villani-agentd" --help'
      - run: |
          export VILLANI_HOME="$RUNNER_TEMP/villani-agentd-home"
          "$RUNNER_TEMP/villani-smoke/bin/villani-agentd" start
          "$RUNNER_TEMP/villani-smoke/bin/villani-agentd" status
          "$RUNNER_TEMP/villani-smoke/bin/villani-agentd" doctor
          "$RUNNER_TEMP/villani-smoke/bin/villani-agentd" stop
      - run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/villani-home/runs"
          set +e
          output=$(VILLANI_HOME="$RUNNER_TEMP/villani-home" "$RUNNER_TEMP/villani-smoke/bin/villani" resume missing 2>&1)
          status=$?
          set -e
          test "$status" -eq 2
          printf '%s\n' "$output" | grep -F "run not found"
          set +e
          latest=$(VILLANI_HOME="$RUNNER_TEMP/villani-home" "$RUNNER_TEMP/villani-smoke/bin/villani" resume --latest 2>&1)
          status=$?
          set -e
          test "$status" -eq 2
          printf '%s\n' "$latest" | grep -F "no interrupted run"
      - run: npm ci
        working-directory: components/villani-flight-recorder
      - run: npm run build
        working-directory: components/villani-flight-recorder
      - run: |
          case ":$PATH:" in
            *":$RUNNER_TEMP/villani-smoke/bin:"*)
              echo "isolated scripts directory unexpectedly present on caller PATH" >&2
              exit 1
              ;;
          esac
          "$RUNNER_TEMP/villani-smoke/bin/python" -m pytest tests/closed_loop/test_cli_e2e.py -m e2e -q

  distribution-smoke:
    needs: node-engine-contract
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: components/villani-flight-recorder/package-lock.json
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.20
      - run: python -m pip install build pytest ruff mypy
      - run: npm ci
        working-directory: components/villani-flight-recorder
      - run: npm run build
        working-directory: components/villani-flight-recorder
      - run: npm ci
        working-directory: components/villani-web
      - run: npm run build
        working-directory: components/villani-web
      - run: python scripts/sync-console-assets.py --check
      - run: python -m pip install -e components/villani-ops -e components/villani-code -e components/villani-agentd -e "components/villani[test]"
      - run: python -m pytest -q
        working-directory: components/villani
      - run: python scripts/ci-package-smoke.py --work "$RUNNER_TEMP/villani-distribution"
        if: runner.os != 'Windows'
      - run: python scripts/ci-package-smoke.py --work "$env:RUNNER_TEMP\villani-distribution"
        if: runner.os == 'Windows'
      - uses: actions/upload-artifact@v4
        with:
          name: villani-${{ runner.os }}-${{ runner.arch }}-rc
          path: ${{ runner.temp }}/villani-distribution/release/*
          if-no-files-found: error

  guided-onboarding:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            components/villani-web/package-lock.json
            components/villani-flight-recorder/package-lock.json
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.20
      - run: python -m pip install build -e components/villani-ops
      - run: npm ci
        working-directory: components/villani-web
      - run: npm run build
        working-directory: components/villani-web
      - run: npm ci
        working-directory: components/villani-flight-recorder
      - run: npm run build
        working-directory: components/villani-flight-recorder
      - run: python scripts/build-vfr-standalone.py --skip-npm-build
      - run: python scripts/sync-console-assets.py --check
      - name: Build the public distribution and internal runtime wheels
        run: |
          mkdir -p "$RUNNER_TEMP/onboarding-wheels"
          python -m build --wheel --outdir "$RUNNER_TEMP/onboarding-wheels" components/villani-code
          python -m build --wheel --outdir "$RUNNER_TEMP/onboarding-wheels" components/villani-ops
          python -m build --wheel --outdir "$RUNNER_TEMP/onboarding-wheels" components/villani-agentd
          python -m build --wheel --outdir "$RUNNER_TEMP/onboarding-wheels" components/villani
      - name: Install only built wheels in a clean environment
        run: |
          set -euo pipefail
          python -m venv "$RUNNER_TEMP/onboarding-env"
          "$RUNNER_TEMP/onboarding-env/bin/python" -m pip install "$RUNNER_TEMP/onboarding-wheels"/*.whl
          "$RUNNER_TEMP/onboarding-env/bin/python" -m pip check
          for command in villani villani-code villani-agentd vfr; do
            "$RUNNER_TEMP/onboarding-env/bin/$command" --help
          done
      - run: npx playwright install --with-deps chromium
        working-directory: components/villani-web
      - name: Run recorded first-user setup through sample completion
        run: |
          set -euo pipefail
          case ":$PATH:" in
            *":$RUNNER_TEMP/onboarding-env/bin:"*)
              echo "selected scripts directory unexpectedly present on caller PATH" >&2
              exit 1
              ;;
          esac
          python onboarding-verification/run_onboarding_gate.py \
            --python "$RUNNER_TEMP/onboarding-env/bin/python"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: guided-onboarding-${{ runner.os }}
          path: onboarding-verification/artifacts/latest/
          if-no-files-found: error
          retention-days: 90

  final-foundation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: python -m pip install -e "components/villani-ops" -e "components/villani-control-plane[test]"
      - run: python -m pytest -q
        working-directory: components/villani-control-plane
      - run: alembic upgrade head --sql > /dev/null
        working-directory: components/villani-control-plane
      - run: python -m pytest -q tests/final_foundation
      - run: python evaluation/final_gate.py --output "$RUNNER_TEMP/final-evaluation.json"
      - run: python scripts/run-final-scenarios.py --output "$RUNNER_TEMP/final-scenarios.json"
      - run: python scripts/supply-chain-gate.py --output "$RUNNER_TEMP/supply-chain"
      - run: python scripts/check-secrets.py integration/fixtures
      - uses: actions/upload-artifact@v4
        with:
          name: final-foundation-evidence
          path: |
            ${{ runner.temp }}/final-evaluation.json
            ${{ runner.temp }}/final-scenarios.json
            ${{ runner.temp }}/supply-chain/*

  packaged-release-gate:
    needs: node-engine-contract
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: villani
          POSTGRES_PASSWORD: villani
          POSTGRES_DB: villani_release
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U villani -d villani_release"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      VILLANI_TEST_POSTGRES_URL: postgresql+psycopg://villani:villani@127.0.0.1:5432/villani_release
      VILLANI_CONTROL_PLANE_DATABASE_URL: postgresql+psycopg://villani:villani@127.0.0.1:5432/villani_release
      PLAYWRIGHT_BROWSERS_PATH: ${{ runner.temp }}/playwright-browsers
      VILLANI_PLAYWRIGHT_PREINSTALLED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - uses: actions/setup-node@v4
        with: {node-version: "20"}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.20
      - run: python -m pip install build pip-audit
      - run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Preinstall the exact Playwright Chromium runtime
        run: |
          set -euo pipefail
          npx --yes playwright@1.61.1 --version | tee "$RUNNER_TEMP/playwright-preinstall-version.log"
          npx --yes playwright@1.61.1 install --with-deps chromium 2>&1 | tee "$RUNNER_TEMP/playwright-preinstall.log"
      - name: Verify the checkout has no residual dependency trees
        run: |
          test -z "$(find components -type d -name node_modules -print -quit)"
      - name: Run isolated package build and connected release gate
        run: python release-verification/run_release_gate.py --mode ci
      - name: Preserve hosted PostgreSQL service logs
        if: always()
        continue-on-error: true
        run: |
          mkdir -p release-verification/artifacts/latest/logs
          docker logs "${{ job.services.postgres.id }}" > release-verification/artifacts/latest/logs/postgres-service.log 2>&1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: packaged-release-gate-${{ runner.os }}
          path: |
            release-verification/artifacts/latest/
            ${{ runner.temp }}/playwright-preinstall-version.log
            ${{ runner.temp }}/playwright-preinstall.log
          if-no-files-found: error
          retention-days: 90

  release-green:
    if: always()
    runs-on: ubuntu-latest
    needs:
      - villani-code
      - villani-ops
      - villani-ops-process-tree
      - villani-agentd
      - villani-control-plane
      - node-engine-contract
      - clean-install
      - flight-recorder
      - villani-run-model
      - villani-ui
      - villani-web
      - cross-component
      - package-smoke
      - distribution-smoke
      - guided-onboarding
      - final-foundation
      - packaged-release-gate
    steps:
      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: packaged-release-gate-Linux
          path: packaged-release-proof
      - name: Require every real release gate
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
          CERTIFIED_SHA: ${{ github.sha }}
          CERTIFIED_BRANCH: ${{ github.head_ref || github.ref_name }}
          WORKFLOW_RUN_ID: ${{ github.run_id }}
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path

          results = {name: value["result"] for name, value in json.loads(os.environ["NEEDS_JSON"]).items()}
          print(json.dumps(results, sort_keys=True))
          reports = list(Path("packaged-release-proof").rglob("release-gate-report.json"))
          errors = [
              f"job {name} finished with {result}"
              for name, result in results.items()
              if result != "success"
          ]
          report = None
          if len(reports) != 1:
              errors.append(f"expected one authoritative release report, found {reports}")
          else:
              report = json.loads(reports[0].read_text(encoding="utf-8"))
              if report.get("release_verdict") != "RELEASE GATE PASSED":
                  errors.append("packaged release report did not pass")
              identity = report.get("certification_identity") or {}
              if identity.get("git_commit_sha") != os.environ["CERTIFIED_SHA"]:
                  errors.append("packaged release report certifies a different commit")
          output = {
              "release_verdict": "RELEASE GATE PASSED" if not errors else "RELEASE GATE FAILED",
              "git_commit_sha": os.environ["CERTIFIED_SHA"],
              "branch": os.environ["CERTIFIED_BRANCH"],
              "workflow_run_id": os.environ["WORKFLOW_RUN_ID"],
              "jobs": results,
              "authoritative_report": str(reports[0]) if len(reports) == 1 else None,
              "errors": errors,
          }
          destination = Path("release-green-evidence/release-green.json")
          destination.parent.mkdir(parents=True, exist_ok=True)
          destination.write_text(json.dumps(output, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          print(json.dumps(output, sort_keys=True))
          if errors:
              raise SystemExit(1)
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-green-${{ github.run_id }}
          path: release-green-evidence/
          if-no-files-found: warn
          retention-days: 90
