apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-control-plane
spec:
  selector: {app: villani-control-plane}
  ports: [{name: http, port: {{ .Values.service.port }}, targetPort: http}]
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Release.Name }}-control-plane
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels: {app: villani-control-plane}
